<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASG Racing Оверлей рейтинга</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="overlay-root">
    <section class="overlay-card" aria-labelledby="overlay-title">
      <header class="overlay-header">
        <div class="overlay-brand">
          <img class="overlay-logo" src="../social/asg.png" alt="ASG Racing" />
          <div class="overlay-title-wrap">
            <h1 class="overlay-title" id="overlay-title">ASG Racing<br />Рейтинг сервера</h1>
          </div>
        </div>
        <div class="overlay-qr overlay-qr-site">
          <div class="overlay-qr-label">САЙТ</div>
          <img
            id="overlay-qr-site"
            class="overlay-qr-image"
            alt="QR-код сайта ASG Racing"
          />
        </div>
      </header>

      <section class="overlay-section">
        <div class="section-head">
          <div>
            <h2 class="section-title">Рейтинг сервера</h2>
          </div>
          <div class="section-updated" id="overlay-updated">Обновляем...</div>
        </div>

        <div class="leaderboard-card">
          <table class="overlay-table" aria-label="Топ-10 рейтинга ASG Racing">
            <thead>
              <tr>
                <th class="col-rank">№</th>
                <th class="col-driver">Пилот</th>
                <th class="col-points">Очки</th>
                <th class="col-wins">Победы</th>
                <th class="col-bestlap">Лучший круг</th>
              </tr>
            </thead>
            <tbody id="overlay-leaderboard-body">
              <tr>
                <td colspan="5" class="overlay-empty">Загрузка рейтинга...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="overlay-section overlay-bottom-grid">
        <article class="bestlap-card">
          <h2 class="section-title">Лучший круг сервера</h2>
          <div class="bestlap-time" id="overlay-bestlap-time">--:--.---</div>
          <div class="bestlap-driver" id="overlay-bestlap-driver">Имя пилота</div>
          <div class="bestlap-meta" id="overlay-bestlap-meta">Трасса / машина</div>
        </article>

        <div class="qr-grid">
          <article class="overlay-qr overlay-qr-telegram">
            <div class="overlay-qr-label">Telegram</div>
            <img
              id="overlay-qr-telegram"
              class="overlay-qr-image"
              alt="QR-код Telegram ASG Racing"
            />
          </article>

          <article class="overlay-qr overlay-qr-discord">
            <div class="overlay-qr-label">Discord</div>
            <img
              id="overlay-qr-discord"
              class="overlay-qr-image"
              alt="QR-код Discord ASG Racing"
            />
          </article>
        </div>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
