<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Championship Event | ASG Racing</title>
  <meta name="description" content="ASG Racing championship event results and standings." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="event-page">
    <header class="event-hero">
      <a class="back-link" href="/hourly/">← Hourly</a>
      <p class="eyebrow">ASG Racing Special Event</p>
      <h1 id="event-title">Championship Event</h1>
      <p id="event-period" class="event-period"></p>
      <p id="event-description" class="event-description"></p>
    </header>

    <section class="event-section">
      <div class="section-head">
        <h2>Prizes</h2>
      </div>
      <div class="prize-grid" id="prize-grid"></div>
    </section>

    <section class="event-section">
      <div class="section-head">
        <h2>Top 3</h2>
      </div>
      <div class="podium-grid" id="podium-grid"></div>
    </section>

    <section class="event-section">
      <div class="section-head">
        <h2>Standings</h2>
      </div>
      <div class="table-wrap" id="standings-table"></div>
    </section>

    <section class="event-section">
      <div class="section-head">
        <h2>Races</h2>
      </div>
      <div class="race-list" id="race-list"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
