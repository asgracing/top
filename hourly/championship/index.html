  <main class="page championship-page">
    <section class="championship-hero">
      <div>
        <div class="eyebrow" id="championship-status">Championship</div>
        <h1 id="championship-title">Championship</h1>
        <p id="championship-description">Loading...</p>
      </div>
      <div class="championship-progress" id="championship-progress"></div>
    </section>

    <section class="card championship-section">
      <div class="section-head">
        <div>
          <div class="eyebrow" id="championship-upcoming-eyebrow">Upcoming</div>
          <h2 id="championship-upcoming-title">Upcoming races</h2>
        </div>
      </div>
      <div id="championship-upcoming" class="schedule-cards-grid"></div>
    </section>

    <section class="card championship-section" id="championship-prizes-section">
      <div class="section-head">
        <div>
          <div class="eyebrow" data-i18n="prizesEyebrow">Prizes</div>
          <h2 data-i18n="prizesTitle">Rewards</h2>
        </div>
      </div>
      <div id="championship-prizes-grid" class="championship-prizes-grid"></div>
    </section>

    <section class="card championship-section" id="championship-standings-section">
      <div class="section-head">
        <div>
          <div class="eyebrow" data-i18n="standingsEyebrow">Standings</div>
          <h2 data-i18n="standingsTitle">Championship results</h2>
        </div>
      </div>
      <div class="table-card table-card-compact">
        <div class="table-wrap" id="championship-standings"></div>
      </div>
    </section>

    <section class="card championship-section" id="championship-race-results-section">
      <div class="section-head">
        <div>
          <div class="eyebrow" data-i18n="raceResultsEyebrow">Archive</div>
          <h2 data-i18n="raceResultsTitle">Championship race results</h2>
        </div>
      </div>
      <div id="championship-race-results" class="championship-race-results"></div>
    </section>

    <div class="championship-lightbox" id="championship-lightbox" aria-hidden="true">
      <button class="championship-lightbox-close" id="championship-lightbox-close" type="button" aria-label="Close">x</button>
      <img id="championship-lightbox-image" src="" alt="" />
    </div>

    <div class="modal-overlay" id="schedule-modal" aria-hidden="true">
      <div class="modal-card modal-card-slot" role="dialog" aria-modal="true" aria-labelledby="schedule-modal-title">
        <button class="modal-close" id="schedule-modal-close" type="button" aria-label="Close" data-i18n-aria-label="closeLabel">x</button>
        <div class="modal-header">
          <div>
            <div class="eyebrow" data-i18n="championshipEvent">Championship Event</div>
            <h3 id="schedule-modal-title" class="modal-title">--</h3>
            <p id="schedule-modal-subtitle" class="modal-subtitle">--</p>
          </div>
        </div>
        <div class="schedule-modal-details" id="schedule-modal-details"></div>
      </div>
